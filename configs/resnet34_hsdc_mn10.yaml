# ResNet-34 + HSDC on ModelNet10 — 3DGS radiance field ERP
# Target: 97.1% top-1 accuracy (HSDC paper Table 2)
# Reference: Stringhini et al., IEEE ICIP 2024, §III-A
# Input: N_SHELLS-channel radiance field ERP from ModelSplat PLY files

run_name: resnet34_hsdc_mn10_seed42
seed: 42

data:
  dataset: modelnet10
  data_root: gs_data/modelsplat/modelsplat_ply
  cache_dir: data/processed/modelnet10/radiance_field
  pipeline: radiance_field          # EgoNeRF exponential shell ERP from 3DGS
  n_shells: 8                        # number of concentric sphere shells
  erp_width: 512
  erp_height: 256
  r_near_pct: 5                      # 5th percentile of r_dist for r_near
  r_far_pct: 95                      # 95th percentile of r_dist for r_far
  cutoff_sigma: 3.0                  # spatial culling threshold (in sigmas)
  num_workers: 4
  batch_size: 32
  train_val_split: 0.8
  augment_prob: 0.3                  # per-primitive augmentation probability (0.15 in paper)

model:
  backbone: resnet34
  block: hsdc
  num_classes: 10
  in_channels: 8                     # equals n_shells
  erp_width: 512
  erp_height: 256
  dropout: 0.3                       # dropout before final FC (was 0.0)

training:
  max_epochs: 500                    # HSDC paper §III-A
  optimizer: adam
  lr: 1.0e-4
  weight_decay: 1.0e-4               # L2 regularisation (was 0.0)
  lr_scheduler: step
  lr_step_size: 50                   # less frequent drops (was 25)
  lr_gamma: 0.5                      # stronger per-step (was 0.9) — decays 1e-4→1e-7 in 500 ep
  lr_min: 1.0e-7
  lr_warmup_epochs: 10               # linear warmup from 10% to 100% of base LR
  early_stopping_patience: 50        # wider window — allow 1+ LR drops to manifest (was 25)
  gradient_clip_norm: 1.0
  mixed_precision: true
  label_smoothing: 0.1               # reduces overconfidence on ambiguous classes (was 0.0)
  class_weighted_loss: true          # up-weight minority classes (bathtub 50 vs chair 100 samples)

output:
  experiments_dir: experiments
  save_every_n_epochs: 50
