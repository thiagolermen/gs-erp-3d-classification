# ResNet-34 + HSDC on ModelNet40 — 3DGS radiance field ERP
# Target: 93.9% top-1 accuracy (HSDC paper Table 3)
# Reference: Stringhini et al., IEEE ICIP 2024, §III-A
# Input: N_SHELLS-channel radiance field ERP from ModelSplat PLY files

run_name: resnet34_hsdc_mn40_seed42
seed: 42

data:
  dataset: modelnet40
  data_root: gs_data/modelsplat/modelsplat_ply
  cache_dir: data/processed/modelnet40/radiance_field
  pipeline: radiance_field          # EgoNeRF exponential shell ERP from 3DGS
  n_shells: 8                        # number of concentric sphere shells
  erp_width: 512
  erp_height: 256
  r_near_pct: 5
  r_far_pct: 95
  cutoff_sigma: 3.0
  num_workers: 4
  batch_size: 32
  train_val_split: 0.8
  augment_prob: 0.3                  # per-primitive augmentation probability
  log1p_transform: true
  derived_channels:
    - pseudo_depth
    - mip

model:
  backbone: resnet34
  block: hsdc
  num_classes: 40
  in_channels: 10                    # 8 density shells + pseudo_depth + mip
  erp_width: 512
  erp_height: 256
  dropout: 0.3                       # dropout before final FC

training:
  max_epochs: 500                    # HSDC paper §III-A
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 5.0e-4
  lr_scheduler: cosine
  lr_min: 1.0e-6
  lr_warmup_epochs: 10
  early_stopping_patience: 100
  gradient_clip_norm: 1.0
  mixed_precision: true
  label_smoothing: 0.1
  class_weighted_loss: true
  mixup_alpha: 0.4

output:
  experiments_dir: experiments
  save_every_n_epochs: 50
