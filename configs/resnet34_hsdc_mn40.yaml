# ResNet-34 + HSDC on ModelNet40 — 3DGS radiance field ERP
# Target: 93.9% top-1 accuracy (HSDC paper Table 3)
# Reference: Stringhini et al., IEEE ICIP 2024, §III-A
# Input: N_SHELLS-channel radiance field ERP from ModelSplat PLY files

run_name: resnet34_hsdc_mn40_seed42
seed: 42

data:
  dataset: modelnet40
  data_root: gs_data/modelsplat/modelsplat_ply
  cache_dir: data/processed/modelnet40/radiance_field
  pipeline: radiance_field          # EgoNeRF exponential shell ERP from 3DGS
  n_shells: 8                        # number of concentric sphere shells
  erp_width: 512
  erp_height: 256
  r_near_pct: 5
  r_far_pct: 95
  cutoff_sigma: 3.0
  num_workers: 4
  batch_size: 32
  train_val_split: 0.8

model:
  backbone: resnet34
  block: hsdc
  num_classes: 40
  in_channels: 8                     # equals n_shells
  erp_width: 512
  erp_height: 256
  dropout: 0.0

training:
  max_epochs: 500                    # HSDC paper §III-A
  optimizer: adam
  lr: 1.0e-4
  weight_decay: 0.0
  lr_scheduler: step
  lr_step_size: 25
  lr_gamma: 0.9
  lr_min: 1.0e-7
  early_stopping_patience: 25
  gradient_clip_norm: 1.0
  mixed_precision: true
  label_smoothing: 0.0

output:
  experiments_dir: experiments
  save_every_n_epochs: 50
