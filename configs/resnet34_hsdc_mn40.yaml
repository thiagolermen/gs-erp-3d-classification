# ResNet-34 + HSDC on ModelNet40 — baseline reproduction
# Target: 93.9% top-1 accuracy (HSDC paper Table 3)
# Reference: Stringhini et al., IEEE ICIP 2024, §III-A

run_name: resnet34_hsdc_mn40_seed42
seed: 42

data:
  dataset: modelnet40
  data_root: data/raw/modelnet40
  cache_dir: data/processed/modelnet40/hsdc
  pipeline: hsdc                 # 12-channel ERP
  num_workers: 4
  batch_size: 32
  train_val_split: 0.8

model:
  backbone: resnet34
  block: hsdc
  num_classes: 40
  erp_width: 512
  erp_height: 256
  dropout: 0.0

training:
  max_epochs: 500                # HSDC paper §III-A
  optimizer: adam
  lr: 1.0e-4
  weight_decay: 0.0
  lr_scheduler: step
  lr_step_size: 25
  lr_gamma: 0.9
  lr_min: 1.0e-7
  early_stopping_patience: 25
  gradient_clip_norm: 1.0
  mixed_precision: true
  label_smoothing: 0.0

output:
  experiments_dir: experiments
  save_every_n_epochs: 50
