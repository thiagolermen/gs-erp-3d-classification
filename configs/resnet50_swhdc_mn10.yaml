# ResNet-50 + SWHDC on ModelNet10 — 3DGS radiance field ERP
# Target: 94.11% top-1 accuracy (SWHDC paper Table III)
# Reference: Stringhini et al., SIBGRAPI 2024, §IV-A
# Input: N_SHELLS-channel radiance field ERP from ModelSplat PLY files

run_name: resnet50_swhdc_mn10_seed42
seed: 42

data:
  dataset: modelnet10
  data_root: gs_data/modelsplat/modelsplat_ply
  cache_dir: data/processed/modelnet10/radiance_field
  pipeline: radiance_field          # EgoNeRF exponential shell ERP from 3DGS
  n_shells: 8                        # number of concentric sphere shells
  erp_width: 512
  erp_height: 256
  r_near_pct: 5
  r_far_pct: 95
  cutoff_sigma: 3.0
  num_workers: 4
  batch_size: 32
  train_val_split: 0.8
  augment_prob: 0.3                  # per-primitive augmentation probability

model:
  backbone: resnet50
  block: swhdc
  num_classes: 10
  in_channels: 8                     # equals n_shells
  erp_width: 512
  erp_height: 256
  dropout: 0.3                       # dropout before final FC (was 0.0)

training:
  max_epochs: 200                    # SWHDC paper §IV-A
  optimizer: adam
  lr: 1.0e-4
  weight_decay: 1.0e-4               # L2 regularisation (was 0.0)
  lr_scheduler: step
  lr_step_size: 50                   # 4 drops over 200 epochs (was 25/8 drops)
  lr_gamma: 0.5                      # 1e-4 → 6.25e-6 after 200 epochs
  lr_min: 1.0e-7
  lr_warmup_epochs: 10               # linear warmup
  early_stopping_patience: 50        # wider window (was 25)
  gradient_clip_norm: 1.0
  mixed_precision: true
  label_smoothing: 0.1               # was 0.0
  class_weighted_loss: true

output:
  experiments_dir: experiments
  save_every_n_epochs: 50
