# ResNet-50 + SWHDC on ModelNet10 — 3DGS radiance field ERP
# Target: 94.11% top-1 accuracy (SWHDC paper Table III)
# Reference: Stringhini et al., SIBGRAPI 2024, §IV-A
# Input: N_SHELLS-channel radiance field ERP from ModelSplat PLY files

run_name: resnet50_swhdc_mn10_seed42
seed: 42

data:
  dataset: modelnet10
  data_root: gs_data/modelsplat/modelsplat_ply
  cache_dir: data/processed/modelnet10/radiance_field
  pipeline: radiance_field          # EgoNeRF exponential shell ERP from 3DGS
  n_shells: 8
  erp_width: 512
  erp_height: 256
  r_near_pct: 5.0
  r_far_pct: 95.0
  add_color_erp: false
  n_steps_per_shell: 4              # ray-march steps within each shell's radial extent
  cutoff_sigma: 3.0
  num_workers: 4
  batch_size: 32
  train_val_split: 0.8
  augment_prob: 0.3                  # per-primitive augmentation probability
  log1p_transform: true              # compress density range; amplifies boundaries
  derived_channels:
    - pseudo_depth
    - mip

model:
  backbone: resnet50
  block: swhdc
  num_classes: 10
  in_channels: 10                    # 8 density shells + pseudo_depth + mip
  erp_width: 512
  erp_height: 256
  dropout: 0.3                       # dropout before final FC

training:
  max_epochs: 400                    # was 200; extended since SWHDC still improving at epoch 200
  optimizer: adamw                   # decoupled weight decay (was adam)
  lr: 1.0e-4
  weight_decay: 5.0e-4               # stronger regularisation (was 1e-4)
  lr_scheduler: cosine               # smoother decay (was step)
  lr_min: 1.0e-6                     # slightly higher floor (was 1e-7)
  lr_warmup_epochs: 10               # linear warmup
  early_stopping_patience: 150       # was 100; extended to match longer run
  gradient_clip_norm: 1.0
  mixed_precision: true
  label_smoothing: 0.1
  class_weighted_loss: true
  mixup_alpha: 0.4                   # MixUp blending
  cutmix_alpha: 0.4                  # CutMix — alternates 50/50 with MixUp per batch

output:
  experiments_dir: experiments
  save_every_n_epochs: 50
