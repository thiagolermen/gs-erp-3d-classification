# ResNet-50 + SWHDC on ModelNet40 — baseline reproduction
# Target: 91.89% top-1 accuracy (SWHDC paper Table III)
# Reference: Stringhini et al., SIBGRAPI 2024, §IV-A

run_name: resnet50_swhdc_mn40_seed42
seed: 42

data:
  dataset: modelnet40
  data_root: data/raw/modelnet40
  cache_dir: data/processed/modelnet40/swhdc
  pipeline: swhdc                # 1-channel depth ERP
  num_workers: 4
  batch_size: 32
  train_val_split: 0.8

model:
  backbone: resnet50
  block: swhdc
  num_classes: 40
  erp_width: 512
  erp_height: 256
  dropout: 0.0

training:
  max_epochs: 200                # SWHDC paper §IV-A
  optimizer: adam
  lr: 1.0e-4
  weight_decay: 0.0
  lr_scheduler: step
  lr_step_size: 25
  lr_gamma: 0.9
  lr_min: 1.0e-7
  early_stopping_patience: 25
  gradient_clip_norm: 1.0
  mixed_precision: true
  label_smoothing: 0.0

output:
  experiments_dir: experiments
  save_every_n_epochs: 50
