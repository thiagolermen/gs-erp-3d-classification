# Swin-T + HSDC on ModelNet10 — proposed experiment
# Input: 12-channel ERP → HSDCBlock(12→48, 7×7) → Swin-T
# Reference: this work; HSDC paper §II-C; Swin Transformer ICCV 2021

run_name: swin_t_hsdc_mn10_seed42
seed: 42

data:
  dataset: modelnet10
  data_root: data/raw/modelnet10
  cache_dir: data/processed/modelnet10/hsdc
  pipeline: hsdc                 # 12-channel ERP
  num_workers: 4
  batch_size: 32
  train_val_split: 0.8

model:
  backbone: swin_t
  block: hsdc
  num_classes: 10
  erp_width: 512
  erp_height: 256
  dropout: 0.0

training:
  max_epochs: 500                # HSDC-pipeline experiments: 500 epochs
  optimizer: adam
  lr: 1.0e-4
  weight_decay: 0.0
  lr_scheduler: step
  lr_step_size: 25
  lr_gamma: 0.9
  lr_min: 1.0e-7
  early_stopping_patience: 25
  gradient_clip_norm: 1.0
  mixed_precision: true
  label_smoothing: 0.0

output:
  experiments_dir: experiments
  save_every_n_epochs: 50
