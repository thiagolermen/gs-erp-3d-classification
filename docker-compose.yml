# =============================================================================
# ERP-ViT 3D Classification — Docker Compose
# =============================================================================
#
# Used only on the lab machine (GPU host) for training and evaluation.
# Data preprocessing is done on the local machine — see README.
#
# Requirements on the lab machine:
#   - Docker Engine >= 24.0 with the docker compose plugin (v2)
#   - nvidia-container-toolkit installed and configured:
#       https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/
#   - Git configured (user.name + user.email) so git push works from inside
#     the container:
#       git config --global user.name  "Your Name"
#       git config --global user.email "you@example.com"
#
# Quick start:
#   make build          # build the image
#   make check-gpu      # verify GPU access inside the container
#   make shell          # interactive bash session with GPU
#
# Training:
#   make train CONFIG=configs/resnet34_hsdc_mn10.yaml
#
# Jupyter (lab machine):
#   make jupyter        # then SSH tunnel: ssh -L 8888:localhost:8888 user@lab
#
# Git push from inside the container:
#   make shell          # open interactive session
#   git add ... && git commit -m "..." && git push
# =============================================================================

services:
  erp-vit:
    build:
      context: .
      dockerfile: Dockerfile
      # Override CUDA/PyTorch version if needed:
      # args:
      #   PYTORCH_VERSION: "2.2.0"
      #   CUDA_VERSION: "12.1"
      #   CUDNN_VERSION: "8"
    image: erp-vit:latest

    # ── GPU access ──────────────────────────────────────────────────────────
    # Requires nvidia-container-toolkit on the host.
    # See: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all          # use all available GPUs
              capabilities: [gpu]

    # ── Shared memory ────────────────────────────────────────────────────────
    # PyTorch DataLoader with num_workers > 0 needs > 64 MB shared memory.
    # 16 GB covers large batch sizes with 4–8 worker processes.
    shm_size: '16g'

    # ── File descriptor limits ───────────────────────────────────────────────
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    # ── Volumes ──────────────────────────────────────────────────────────────
    #
    # The entire project directory is mounted at /workspace.  This has two
    # benefits over baking the source into the image:
    #
    #   1. Git access — .git/ is present, so `git add / commit / push` work
    #      from inside the container without extra steps.
    #   2. Live edits — code changes on the host are visible immediately
    #      without rebuilding the image (the editable pip install points to
    #      /workspace/src, which now comes from the mount).
    #
    # data/ and experiments/ are inside the project tree, so they are covered
    # by the project mount.  The processed ERP cache (data/processed/) must
    # be transferred from your local machine before training — see README.
    #
    volumes:
      # --- Project source + git ---
      - ./:/workspace

      # --- Git identity (for commits / pushes inside the container) ---
      # Requires ~/.gitconfig to exist on the lab machine.
      # Create it with: git config --global user.name / user.email
      - ${HOME}/.gitconfig:/root/.gitconfig:ro

      # --- SSH keys (for git push over SSH, e.g. git@github.com:...) ---
      # Comment out if you use HTTPS + personal access token instead.
      # Make sure the lab machine's ~/.ssh/id_* key is authorised on GitHub.
      - ${HOME}/.ssh:/root/.ssh:ro

    # ── Environment ──────────────────────────────────────────────────────────
    environment:
      - PYTHONPATH=/workspace
      - MPLBACKEND=Agg
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OMP_NUM_THREADS=4
      - TOKENIZERS_PARALLELISM=false

    # ── Ports ────────────────────────────────────────────────────────────────
    # 8888: Jupyter Notebook / JupyterLab
    # Access via SSH tunnel: ssh -L 8888:localhost:8888 user@lab-machine
    ports:
      - "8888:8888"

    # ── Runtime ──────────────────────────────────────────────────────────────
    working_dir: /workspace
    stdin_open: true
    tty: true
    restart: "no"       # explicit control; no auto-restart for research jobs

    # Default command: interactive shell.
    # Overridden by `docker compose run erp-vit <command>`.
    command: bash
