# =============================================================================
# GS-ERP 3D Classification — Docker Compose
# =============================================================================
#
# Everything runs here: data download, preprocessing, training, evaluation,
# and notebooks.  No local Python environment needed.
#
# Requirements:
#   - Docker Engine >= 24.0 with the Compose plugin (v2)
#   - nvidia-container-toolkit installed and configured
#   - Git configured on the host:
#       git config --global user.name  "Your Name"
#       git config --global user.email "you@example.com"
#
# Quick start:
#   make build        # build the image
#   make check-gpu    # verify GPU access
#   make shell        # interactive bash session
# =============================================================================

services:
  gs-erp:
    build:
      context: .
      dockerfile: Dockerfile
      # Override CUDA/PyTorch version if needed:
      # args:
      #   PYTORCH_VERSION: "2.2.0"
      #   CUDA_VERSION: "12.1"
      #   CUDNN_VERSION: "8"
    image: gs-erp:latest

    # GPU access — requires nvidia-container-toolkit on the host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # PyTorch DataLoader with num_workers > 0 needs shared memory > 64 MB
    shm_size: '16g'

    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    volumes:
      # Project directory: source code, configs, scripts, experiments, data
      # .git/ is included so git commit/push work from inside the container
      - ./:/workspace

      # Git identity for commits inside the container
      - ${HOME}/.gitconfig:/root/.gitconfig:ro

      # SSH keys for git push over SSH (comment out if using HTTPS + PAT)
      - ${HOME}/.ssh:/root/.ssh:ro

    environment:
      - PYTHONPATH=/workspace
      - MPLBACKEND=Agg
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OMP_NUM_THREADS=4
      - TOKENIZERS_PARALLELISM=false

    # Jupyter port — access via SSH tunnel: ssh -L 8888:localhost:8888 lermen@anubis
    ports:
      - "8888:8888"

    working_dir: /workspace
    stdin_open: true
    tty: true
    restart: "no"
    command: bash
